<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水費異常增加自我檢測系統 v2</title>
    <!-- 使用 Tailwind CSS 建立現代化美觀介面 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        /* 背景浮水印設定 */
        .watermark-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-25%, -50%);
            width: 80vw;
            max-width: 600px;
            height: auto;
            opacity: 0.04;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between text-slate-800 relative overflow-x-hidden">

    <!-- 台灣自來水公司 LOGO 向量背景浮水印 (由經典台水藍圓形與三條波浪水紋構成) -->
    <div class="watermark-bg flex flex-col items-center justify-center">
        <svg viewBox="0 0 200 200" class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
            <!-- 外圈齒輪/圓圈意象 -->
            <circle cx="100" cy="100" r="85" fill="none" stroke="#0066CC" stroke-width="12"/>
            <circle cx="100" cy="100" r="70" fill="#0066CC"/>
            <!-- 經典三道白色水波紋路 -->
            <path d="M 50,85 C 75,70 85,100 110,85 C 125,75 135,80 150,85" fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
            <path d="M 50,105 C 75,90 85,120 110,105 C 125,95 135,100 150,105" fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
            <path d="M 50,125 C 75,110 85,140 110,125 C 125,115 135,120 150,125" fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
        </svg>
        <div class="text-[#0066CC] font-bold text-3xl tracking-widest mt-4 text-center whitespace-nowrap">台灣自來水公司</div>
    </div>

    <!-- 頁首 -->
    <header class="bg-blue-600 text-white shadow-md py-6 px-4 text-center relative z-10">
        <h1 class="text-2xl md:text-3xl font-bold tracking-wide">💧 水費異常增加自我檢測系統</h1>
        <p class="text-blue-100 text-sm mt-2">請根據您的實際居家狀況進行點選，協助您找出水費增加的潛在原因</p>
    </header>

    <!-- 主要內容區 -->
    <main class="max-w-2xl w-full mx-auto p-4 flex-grow flex flex-col items-center justify-center relative z-10">
        <div class="bg-white/95 backdrop-blur-sm rounded-2xl shadow-xl p-6 md:p-8 w-full border border-slate-100 transition-all duration-300">
            
            <!-- 進度條與步驟 -->
            <div id="progress-container" class="mb-6">
                <div class="flex justify-between items-center text-xs text-slate-400 mb-2">
                    <span id="step-label">檢測進行中</span>
                    <span id="step-count">步驟</span>
                </div>
                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-300" style="width: 20%"></div>
                </div>
            </div>

            <!-- 問題 / 結果顯示區 -->
            <div id="content-box" class="min-h-[160px] flex flex-col justify-center">
                <h2 id="question-text" class="text-xl font-semibold text-slate-800 mb-6 leading-relaxed">
                    <!-- 動態載入問題 -->
                </h2>
                
                <!-- 選項按鈕區 -->
                <div id="options-container" class="space-y-3">
                    <!-- 動態載入選項 -->
                </div>

                <!-- 診斷結果呈現區 (預設隱藏) -->
                <div id="result-container" class="hidden text-center py-4">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-full mb-4 text-3xl">
                        💡
                    </div>
                    <h3 class="text-lg font-bold text-slate-500 mb-2">診斷分析結果</h3>
                    <div id="result-text" class="text-xl font-bold text-blue-700 bg-blue-50 border border-blue-100 rounded-xl p-5 shadow-inner leading-relaxed">
                        <!-- 動態載入答案 -->
                    </div>
                </div>
            </div>

            <!-- 底部控制按鈕 -->
            <div class="mt-8 pt-4 border-t border-slate-100 flex justify-between items-center">
                <button id="btn-back" class="px-4 py-2 border border-slate-300 text-slate-600 rounded-lg text-sm font-medium hover:bg-slate-50 disabled:opacity-30 disabled:pointer-events-none transition cursor-pointer">
                    ← 上一步
                </button>
                <button id="btn-restart" class="px-4 py-2 bg-slate-800 text-white rounded-lg text-sm font-medium hover:bg-slate-900 transition cursor-pointer">
                    🔄 重新檢測
                </button>
            </div>
        </div>

        <!-- 功能列：QR Code 與連結分享區 -->
        <div class="w-full mt-4 bg-white/95 backdrop-blur-sm rounded-xl shadow-md border border-slate-100 p-4 flex items-center justify-between gap-4">
            <div class="flex items-center justify-center bg-slate-100 p-1.5 rounded-lg border border-slate-200 shadow-inner">
                <!-- 純淨 QR Code，不含任何旁邊提示字 -->
                <img id="share-qrcode" src="" alt="QR Code" class="w-16 h-16 bg-white block">
            </div>
            <div class="flex-grow sm:flex-grow-0 w-full sm:w-auto text-right">
                <button id="btn-share" class="w-full sm:w-auto px-4 py-2.5 bg-blue-50 text-blue-600 border border-blue-200 rounded-lg text-sm font-bold hover:bg-blue-100 transition cursor-pointer flex items-center justify-center gap-2">
                    🔗 複製分享連結
                </button>
            </div>
        </div>
    </main>

    <!-- 頁尾免責聲明 -->
    <footer class="text-center py-4 px-6 text-xs text-slate-400 border-t border-slate-200 bg-white/90 relative z-10 max-w-4xl mx-auto w-full rounded-t-xl shadow-sm leading-relaxed">
        【免責聲明:本檢測流程根據自來水用戶常見水費異常查漏指引製作，但每人家中環境，管路、馬達及水塔補水方式有異，請依實際現況判斷】
    </footer>

    <!-- 決策樹邏輯控制腳本 -->
    <script>
        const decisionTree = {
            q1: {
                text: `Q1. 您有無獨立水塔間接用水？<span class="block text-sm font-normal text-slate-500 mt-1">（公寓、大樓用戶請選擇「沒有」）</span>`,
                options: [
                    { text: "有", next: "has_tank_q2" },
                    { text: "沒有", next: "no_tank_q2" }
                ]
            },
            
            // --- 有獨立水塔分支 ---
            has_tank_q2: {
                text: "請查看帳單上的表號並找到您的水表表號，核對現場水表指針數是否「小於」帳單上載明的指針數？",
                options: [
                    { text: "是（水表指針數 小於 帳單指針數）", next: "result_wrong_reading" },
                    { text: "否（水表指針數 大於或等於 帳單指針數）", next: "has_tank_q3" }
                ]
            },
            has_tank_q3: {
                text: "在「沒用水」且「水塔確定未補水」的狀態下，確認現場水表是否仍在轉動？",
                options: [
                    { text: "是（會轉）", next: "result_leak_before_tank" },
                    { text: "否（沒轉）", next: "has_tank_q4" }
                ]
            },
            has_tank_q4: {
                text: "請定期觀察並記錄指針數，看看後續水量是否有恢復正常？",
                options: [
                    { text: "有（水量已下降）", next: "result_leak_faucet_toilet" },
                    { text: "無（水量仍偏高）", next: "result_leak_after_tank" }
                ]
            },

            // --- 沒有獨立水塔分支 ---
            no_tank_q2: {
                text: "請查看帳單上的表號並找到您的表號，核對現場水表指針數是否「小於」帳單上載明的指針數？",
                options: [
                    { text: "是（核對指針 小於 帳單指針數）", next: "result_wrong_reading" },
                    { text: "否（水表指針數 大於或等於 帳單指針數）", next: "no_tank_q3" }
                ]
            },
            no_tank_q3: {
                text: "進行關水測試，是否「確實」是帳單上登記的那顆水表在轉動？",
                options: [
                    { text: "是", next: "no_tank_q4" },
                    { text: "否（這顆表沒轉，而是旁邊別人的表在轉）", next: "result_wrong_meter_or_pipe" }
                ]
            },
            no_tank_q4: {
                text: "在「家中完全沒用水」的狀態下，確認水表是否仍在轉動？",
                options: [
                    { text: "是（會轉）", next: "result_leak_after_meter" },
                    { text: "否（沒轉）", next: "no_tank_q5" }
                ]
            },
            no_tank_q5: {
                text: "請定期觀察並記錄指針數，看看後續水量是否有恢復正常？",
                options: [
                    { text: "有（水量已下降）", next: "result_leak_faucet_toilet_2" },
                    { text: "無（水量仍偏高）", next: "result_unstable_equipment" }
                ]
            },

            // --- 終點診斷結果 (已為自來水公司加上自動撥號超連結) ---
            result_wrong_reading: {
                isResult: true,
                text: `可能抄錯表了！請儘速通報自來水公司進行複查，電話：<a href="tel:035714321" class="text-blue-600 underline font-extrabold hover:text-blue-800">03-5714321</a>`
            },
            result_leak_before_tank: {
                isResult: true,
                text: "高機率是「水表到水塔之間」的管路發生漏水。"
            },
            result_leak_faucet_toilet: {
                isResult: true,
                text: "應是先前水龍頭沒關好，或是馬桶等用水設備有短暫異常。"
            },
            result_leak_after_tank: {
                isResult: true,
                text: "問題點（漏水）應發生在「水塔後」的用水設備或出水管路。"
            },
            result_wrong_meter_or_pipe: {
                isResult: true,
                text: `請通報自來水公司，確認是「水表裝錯（換錯表）」或是「內線配錯管路」，電話：<a href="tel:035714321" class="text-blue-600 underline font-extrabold hover:text-blue-800">03-5714321</a>`
            },
            result_leak_after_meter: {
                isResult: true,
                text: "您表後有漏水狀況！請仔細留意家中用水設備及牆面暗管。若自行無法查出，建議委請專業水電行到府查漏。"
            },
            result_leak_faucet_toilet_2: {
                isResult: true,
                text: "應是先前水龍頭沒關好，或是馬桶等用水設備異常。"
            },
            result_unstable_equipment: {
                isResult: true,
                text: "應是家中用水設備（如馬桶浮球、落水器等）時好時壞，請務必持續留意。"
            }
        };

        // 狀態紀錄
        let historyStack = ['q1'];

        // DOM 元素選取
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const resultContainer = document.getElementById('result-container');
        const btnBack = document.getElementById('btn-back');
        const btnRestart = document.getElementById('btn-restart');
        const progressBar = document.getElementById('progress-bar');
        const stepCount = document.getElementById('step-count');
        const stepLabel = document.getElementById('step-label');
        const btnShare = document.getElementById('btn-share');
        const qrCodeImg = document.getElementById('share-qrcode');

        // 渲染目前節點內容
        function renderCurrentNode() {
            const currentNodeKey = historyStack[historyStack.length - 1];
            const node = decisionTree[currentNodeKey];

            btnBack.disabled = historyStack.length === 1;

            if (node.isResult) {
                questionText.classList.add('hidden');
                optionsContainer.classList.add('hidden');
                resultContainer.classList.remove('hidden');
                
                document.getElementById('result-text').innerHTML = node.text;
                
                progressBar.style.width = '100%';
                stepCount.innerText = '診斷完成';
                stepLabel.innerText = '分析結果';
            } else {
                questionText.classList.remove('hidden');
                optionsContainer.classList.remove('hidden');
                resultContainer.classList.add('hidden');

                questionText.innerHTML = node.text;
                optionsContainer.innerHTML = '';

                node.options.forEach(option => {
                    const button = document.createElement('button');
                    button.className = "w-full text-left p-4 border-2 border-slate-200 rounded-xl font-medium text-slate-700 hover:border-blue-500 hover:bg-blue-50/50 active:bg-blue-50 transition duration-150 focus:outline-none focus:ring-2 focus:ring-blue-400 cursor-pointer shadow-sm";
                    button.innerHTML = option.text;
                    button.onclick = () => selectOption(option.next);
                    optionsContainer.appendChild(button);
                });

                const progressPercent = Math.min((historyStack.length / 5) * 100, 90);
                progressBar.style.width = `${progressPercent}%`;
                stepCount.innerText = `第 ${historyStack.length} 階段`;
                stepLabel.innerText = '檢測進行中';
            }
        }

        function selectOption(nextNodeKey) {
            historyStack.push(nextNodeKey);
            renderCurrentNode();
        }

        btnBack.onclick = () => {
            if (historyStack.length > 1) {
                historyStack.pop();
                renderCurrentNode();
            }
        };

        btnRestart.onclick = () => {
            historyStack = ['q1'];
            renderCurrentNode();
        };

        // QR Code 與真實網址分享功能
        function setupSharing() {
            // 抓取此網頁「當下實際的網址/檔案路徑」，不進行台水官方網址的置換取代
            const currentUrl = window.location.href;

            // 利用穩定公開的 API 繪製對應該真實網址的 QR Code
            const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(currentUrl)}`;
            qrCodeImg.src = qrApiUrl;

            // 複製連結按鈕事件 (百分之百複製目前真實網址)
            btnShare.onclick = () => {
                navigator.clipboard.writeText(currentUrl).then(() => {
                    const originalText = btnShare.innerHTML;
                    btnShare.innerHTML = "✅ 網頁連結已複製！";
                    btnShare.classList.remove('bg-blue-50', 'text-blue-600', 'border-blue-200');
                    btnShare.classList.add('bg-green-50', 'text-green-600', 'border-green-200');
                    
                    setTimeout(() => {
                        btnShare.innerHTML = originalText;
                        btnShare.classList.remove('bg-green-50', 'text-green-600', 'border-green-200');
                        btnShare.classList.add('bg-blue-50', 'text-blue-600', 'border-blue-200');
                    }, 2000);
                }).catch(err => {
                    alert("複製失敗，請手動選取瀏覽器網址列複製連結。");
                });
            };
        }

        // 初始化
        renderCurrentNode();
        setupSharing();
    </script>
</body>
</html>
