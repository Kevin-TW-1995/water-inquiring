<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水費異常增加自我檢測系統 v3.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        /* 背景浮水印設定 */
        .watermark-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-25%, -50%);
            width: 80vw;
            max-width: 600px;
            height: auto;
            pointer-events: none;
            z-index: 0;
            opacity: 0.04;
            transition: opacity 0.3s ease;
        }
        /* 自訂滾動條 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body id="theme-body" class="bg-slate-50 min-h-screen flex flex-col justify-between text-slate-800 relative overflow-x-hidden">

    <div class="watermark-bg flex flex-col items-center justify-center">
        <svg viewBox="0 0 200 200" class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
            <circle cx="100" cy="100" r="85" fill="none" stroke="#0066CC" id="wm-circle-out" stroke-width="12"/>
            <circle cx="100" cy="100" r="70" fill="#0066CC" id="wm-circle-in"/>
            <path d="M 50,85 C 75,70 85,100 110,85 C 125,75 135,80 150,85" fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
            <path d="M 50,105 C 75,90 85,120 110,105 C 125,95 135,100 150,105" fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
            <path d="M 50,125 C 75,110 85,140 110,125 C 125,115 135,120 150,125" fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
        </svg>
        <div id="wm-text" class="text-[#0066CC] font-bold text-3xl tracking-widest mt-4 text-center whitespace-nowrap">台灣自來水公司</div>
    </div>

    <header class="bg-blue-600 text-white shadow-md py-6 px-4 text-center relative z-10 transition-colors duration-300">
        <div class="absolute top-3 right-4 flex items-center gap-2 bg-black/20 px-3 py-1.5 rounded-full backdrop-blur-sm border border-white/10 select-none">
            <span class="text-xs font-medium text-blue-100 tracking-wide hidden sm:inline">夜間模式切換</span>
            <button id="btn-theme" class="bg-white/20 hover:bg-white/30 text-white w-7 h-7 flex items-center justify-center rounded-full text-sm cursor-pointer transition shadow-inner" title="切換深淺模式">☀️</button>
        </div>
        <h1 class="text-2xl md:text-3xl font-bold tracking-wide">💧 水費異常增加自我檢測系統</h1>
        
        <div class="mt-4 flex justify-center">
            <a href="https://www.water.gov.tw/checkleak/taiwanwater-1.html" target="_blank" class="inline-flex items-center gap-2 bg-white/20 hover:bg-white/30 text-white border border-white/30 px-4 py-1.5 rounded-full text-sm font-medium transition cursor-pointer backdrop-blur-sm">
                📘 點此查看【台水官方檢漏教學】
            </a>
        </div>
    </header>

    <main class="max-w-2xl w-full mx-auto p-4 flex-grow flex flex-col items-center justify-center relative z-10">
        <div id="main-card" class="bg-white/95 backdrop-blur-sm rounded-2xl shadow-xl p-6 md:p-8 w-full border border-slate-100 transition-all duration-300">
            
            <div id="history-trail-container" class="hidden mb-5 p-3 bg-blue-50/50 rounded-lg border border-blue-100/50">
                <div class="text-xs font-bold text-blue-800 mb-2 flex items-center gap-1">
                    <span>📝 您目前的回答歷程：</span>
                </div>
                <div id="history-trail" class="flex flex-wrap gap-2 text-sm text-slate-600">
                    </div>
            </div>

            <div id="progress-container" class="mb-6">
                <div class="flex justify-between items-center text-xs text-slate-400 mb-2">
                    <span id="step-label">檢測進行中</span>
                    <span id="step-count">步驟</span>
                </div>
                <div id="progress-bg" class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-300" style="width: 20%"></div>
                </div>
            </div>

            <div id="content-box" class="min-h-[160px] flex flex-col justify-center">
                
                <div id="meter-helper" class="hidden mb-6 flex flex-col items-center bg-slate-50 border border-slate-200 p-4 rounded-xl shadow-sm max-w-full">
                    <div class="w-full max-w-[320px] mb-4">
                        <img src="image_17cf85.png" 
                             alt="水表說明圖" 
                             class="w-full h-auto object-contain rounded-xl shadow-md border-2 border-white bg-white"
                             onerror="this.onerror=null; this.src='data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22180%22%3E%3Crect width=%22320%22 height=%22180%22 fill=%22%23f1f5f9%22 rx=%228%22/%3E%3Ctext x=%2250%25%22 y=%2240%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-size=%2214%22 fill=%22%2364748b%22%3E%E2%9A%A0%EF%B8%8F \u5716\u7247\u8F09\u5165\u5931\u6557%3C/text%3E%3Ctext x=%2250%25%22 y=%2255%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-size=%2212%22 fill=%22%2394a3b8%22%3E\u8ACB\u78BA\u8A8D image_17cf85.png \u662F\u5426%u8207\u7DB2\u9801\u653E\u5728\u540C\u4E00\u8CC7\u6599\u593E%3C/text%3E%3C/svg%3E';">
                    </div>
                    <div class="text-sm text-slate-600 space-y-1 w-full text-left">
                        <div class="font-bold text-blue-700 mb-1 border-b border-blue-200 pb-1 flex items-center gap-1">🔎 <span>水表辨識圖例說明：</span></div>
                        <p><span class="font-bold text-red-600">1. 表號：</span>請與水費帳單核對是否一致。</p>
                        <p><span class="font-bold text-red-600">3. 指針數：</span>黑色數字，代表目前度數。</p>
                        <p><span class="font-bold text-red-600">4. 紅色三角指針：</span>若沒用水時持續轉動，代表有漏水。</p>
                    </div>
                </div>

                <h2 id="question-text" class="text-xl font-semibold text-slate-800 mb-6 leading-relaxed">
                    </h2>
                
                <div id="options-container" class="space-y-3">
                    </div>

                <div id="result-container" class="hidden w-full">
                    <div id="result-text" class="w-full text-left font-mono bg-slate-50 border border-slate-200 rounded-xl p-5 shadow-inner leading-relaxed text-sm">
                        </div>
                </div>
            </div>

            <div id="footer-line" class="mt-8 pt-4 border-t border-slate-100 flex justify-between items-center">
                <button id="btn-back" class="px-4 py-2 border border-slate-300 text-slate-600 rounded-lg text-sm font-medium hover:bg-slate-50 disabled:opacity-30 disabled:pointer-events-none transition cursor-pointer">
                    ← 上一步
                </button>
                
                <div class="flex gap-2">
                    <button id="btn-report" class="hidden px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm font-bold hover:bg-emerald-700 transition active:scale-95 cursor-pointer shadow-sm">
                        📨 傳送回報
                    </button>
                    <button id="btn-restart" class="px-4 py-2 bg-slate-800 text-white rounded-lg text-sm font-medium hover:bg-slate-900 transition cursor-pointer">
                        🔄 重新檢測
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 決策樹資料：已經確認移除選項前方的圖示
        const decisionTree = {
            q1: {
                text: `Q1. 您有無獨立水塔間接用水？<span id="q1-hint" class="block text-sm font-normal text-slate-500 mt-1">（公寓、大樓用戶請選擇「沒有」）</span>`,
                options: [
                    { text: "有（透天厝等，有獨立水塔）", short: "有水塔", next: "has_tank_q2" },
                    { text: "沒有（公寓、大樓等，直接供水）", short: "無水塔(直接供水)", next: "no_tank_q2" }
                ]
            },
            has_tank_q2: {
                text: "Q2. 請查看帳單上的「表號」並找到您的水表，核對現場【3.水表指針數】是否「小於」帳單上載明的指針數？",
                showMeterImage: true,
                options: [
                    { text: "是（水表指針數 小於 帳單指針數）", short: "指針小於帳單(疑似抄錯)", next: "result_wrong_reading" },
                    { text: "否（水表指針數 大於或等於 帳單指針數）", short: "指針正常", next: "has_tank_q3" }
                ]
            },
            has_tank_q3: {
                text: "Q3. 在「沒用水」且「水塔確定未補水」的狀態下，確認現場水表【4.紅色三角指針】是否仍在轉動？",
                showMeterImage: true,
                options: [
                    { text: "是（會轉）", short: "未用水但水表持續轉", next: "result_leak_before_tank" },
                    { text: "否（沒轉）", short: "未用水時水表停止", next: "has_tank_q4" }
                ]
            },
            has_tank_q4: {
                text: "Q4. 請定期觀察並記錄指針數，看看後續水量是否有恢復正常？",
                options: [
                    { text: "有（水量已下降）", short: "觀察後水量已下降", next: "result_leak_faucet_toilet" },
                    { text: "無（水量仍偏高）", short: "觀察後水量仍偏高", next: "result_leak_after_tank" }
                ]
            },
            no_tank_q2: {
                text: "Q2. 請查看帳單上的「表號」並找到您的水表，核對現場【3.水表指針數】是否「小於」帳單上載明的指針數？",
                showMeterImage: true,
                options: [
                    { text: "是（指針 小於 帳單指針數）", short: "指針小於帳單(疑似抄錯)", next: "result_wrong_reading" },
                    { text: "否（指針 大於或等於 帳單指針數）", short: "指針正常", next: "no_tank_q3" }
                ]
            },
            no_tank_q3: {
                text: "Q3. 進行關水測試，是否「確實」是帳單上登記的那顆水表在轉動？",
                showMeterImage: true,
                options: [
                    { text: "是，是我帳單這顆表", short: "確認表號正確", next: "no_tank_q4" },
                    { text: "否（這顆表沒轉，是旁邊別人的在轉）", short: "確認表號裝錯或管路接錯", next: "result_wrong_meter_or_pipe" }
                ]
            },
            no_tank_q4: {
                text: "Q4. 在「家中完全沒用水」的狀態下，確認水表【4.紅色三角指針】是否仍在轉動？",
                showMeterImage: true,
                options: [
                    { text: "是（會轉）", short: "未用水但水表持續轉", next: "result_leak_after_meter" },
                    { text: "否（沒轉）", short: "未用水時水表停止", next: "no_tank_q5" }
                ]
            },
            no_tank_q5: {
                text: "Q5. 請定期觀察並記錄指針數，看看後續水量是否有恢復正常？",
                options: [
                    { text: "有（水量已下降）", short: "觀察後水量已下降", next: "result_leak_faucet_toilet_2" },
                    { text: "無（水量仍偏高）", short: "觀察後水量仍偏高", next: "result_unstable_equipment" }
                ]
            },
            result_wrong_reading: {
                isResult: true, requireReport: true,
                estimate: "可能抄錯表了。",
                advice: "請儘速通報自來水公司進行複查（點擊電話直接撥打：<a href='tel:035714321' class='text-blue-600 underline font-bold'>03-5714321</a>）。"
            },
            result_leak_before_tank: {
                isResult: true, requireReport: false,
                estimate: "高機率是「水表到水塔之間」的管路發生漏水。",
                advice: "建議委請專業水電行到府進行查漏與管路修繕。"
            },
            result_leak_faucet_toilet: {
                isResult: true, requireReport: false,
                estimate: "應是先前水龍頭沒關好，或是馬桶等用水設備有短暫異常。",
                advice: "狀況已緩解，請持續留意日常用水習慣即可。"
            },
            result_leak_after_tank: {
                isResult: true, requireReport: false,
                estimate: "問題點（漏水）應發生在「水塔後」的用水設備或出水管路。",
                advice: "建議委請專業水電行到府查漏。"
            },
            result_wrong_meter_or_pipe: {
                isResult: true, requireReport: true,
                estimate: "可能是「水表裝錯（換錯表）」或是「內線配錯管路」。",
                advice: "請通報自來水公司派員確認（點擊電話直接撥打：<a href='tel:035714321' class='text-blue-600 underline font-bold'>03-5714321</a>）。"
            },
            result_leak_after_meter: {
                isResult: true, requireReport: false,
                estimate: "您表後有漏水狀況！",
                advice: "請仔細留意家中用水設備及牆面暗管。若自行無法查出，建議委請專業水電行到府查漏。"
            },
            result_leak_faucet_toilet_2: {
                isResult: true, requireReport: false,
                estimate: "應是先前水龍頭沒關好，或是馬桶等用水設備異常。",
                advice: "狀況已緩解，請持續留意日常用水習慣即可。"
            },
            result_unstable_equipment: {
                isResult: true, requireReport: false,
                estimate: "應是家中用水設備（如馬桶浮球、落水器等）時好時壞。",
                advice: "請務必持續留意設備運作，必要時請水電行更換零件。"
            }
        };

        let historyStack = ['q1'];
        let userAnswers = []; 
        let isDarkMode = false;
        let generatedReportText = ""; 

        // DOM 元素
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const resultContainer = document.getElementById('result-container');
        const btnBack = document.getElementById('btn-back');
        const btnRestart = document.getElementById('btn-restart');
        const btnReport = document.getElementById('btn-report');
        const progressBar = document.getElementById('progress-bar');
        const stepCount = document.getElementById('step-count');
        const stepLabel = document.getElementById('step-label');
        const btnTheme = document.getElementById('btn-theme');
        
        const historyContainer = document.getElementById('history-trail-container');
        const historyTrail = document.getElementById('history-trail');
        const meterHelper = document.getElementById('meter-helper');
        const resultTextEl = document.getElementById('result-text');

        const bodyEl = document.getElementById('theme-body');
        const mainCardEl = document.getElementById('main-card');
        const progressBgEl = document.getElementById('progress-bg');
        const footerLineEl = document.getElementById('footer-line');

        function renderCurrentNode() {
            const currentNodeKey = historyStack[historyStack.length - 1];
            const node = decisionTree[currentNodeKey];

            btnBack.disabled = historyStack.length === 1;
            window.scrollTo({ top: 0, behavior: 'smooth' });

            if (userAnswers.length > 0) {
                historyContainer.classList.remove('hidden');
                historyTrail.innerHTML = userAnswers.map(a => 
                    `<span class="bg-blue-100/80 ${isDarkMode?'text-blue-900':'text-blue-700'} px-2 py-1 rounded border border-blue-200 shadow-sm flex items-center gap-1">
                        <span class="opacity-50 text-xs">Q${a.step}</span> ${a.short}
                    </span>`
                ).join('<span class="text-slate-300 flex items-center">→</span>');
            } else {
                historyContainer.classList.add('hidden');
            }

            if (node.showMeterImage) {
                meterHelper.classList.remove('hidden');
            } else {
                meterHelper.classList.add('hidden');
            }

            if (node.isResult) {
                questionText.classList.add('hidden');
                optionsContainer.classList.add('hidden');
                resultContainer.classList.remove('hidden');
                meterHelper.classList.add('hidden'); 
                
                const summaryHtml = `
                    <div class="text-center font-bold text-lg border-b-2 border-slate-300 pb-2 mb-4 ${isDarkMode?'text-slate-200':'text-slate-700'}">
                        ===========<br>診斷摘要<br>===========
                    </div>
                    <div class="mb-5 space-y-2 pl-2">
                        ${userAnswers.map(a => `<div class="${isDarkMode?'text-slate-300':'text-slate-700'}">✔ ${a.short}</div>`).join('')}
                    </div>
                    <div class="mb-1 text-sm font-bold ${isDarkMode?'text-slate-400':'text-slate-500'}">推估：</div>
                    <div class="font-bold text-lg mb-4 ${isDarkMode?'text-blue-400':'text-blue-700'} pl-2">${node.estimate}</div>
                    <div class="mb-1 text-sm font-bold ${isDarkMode?'text-slate-400':'text-slate-500'}">建議：</div>
                    <div class="font-bold text-lg ${isDarkMode?'text-emerald-400':'text-emerald-600'} pl-2">${node.advice}</div>
                `;
                resultTextEl.innerHTML = summaryHtml;

                generatedReportText = `===========\n診斷摘要\n===========\n\n` +
                                      userAnswers.map(a => `✔ ${a.short}\n`).join('') +
                                      `\n推估：\n${node.estimate}\n\n建議：\n${node.advice.replace(/<[^>]*>/g, '')}\n`; 
                
                progressBar.style.width = '100%';
                stepCount.innerText = '診斷完成';
                stepLabel.innerText = '分析結果';

                if (node.requireReport) {
                    btnReport.classList.remove('hidden');
                } else {
                    btnReport.classList.add('hidden');
                }
            } else {
                questionText.classList.remove('hidden');
                optionsContainer.classList.remove('hidden');
                resultContainer.classList.add('hidden');
                btnReport.classList.add('hidden');

                questionText.innerHTML = node.text;
                optionsContainer.innerHTML = '';

                node.options.forEach(option => {
                    const button = document.createElement('button');
                    button.innerHTML = option.text;
                    optionsContainer.appendChild(button);
                    applyButtonTheme(button);
                    button.onclick = () => selectOption(node.text, option.text, option.short, option.next);
                });

                const progressPercent = Math.min((historyStack.length / 5) * 100, 90);
                progressBar.style.width = `${progressPercent}%`;
                stepCount.innerText = `第 ${historyStack.length} 階段`;
                stepLabel.innerText = '檢測進行中';
            }
            updateDynamicColors(); 
        }

        function applyButtonTheme(btn) {
            if (isDarkMode) {
                btn.className = "w-full text-left p-4 border-2 border-slate-600 rounded-xl font-medium text-slate-200 bg-slate-800/60 hover:border-blue-400 hover:bg-slate-700/50 active:scale-98 transition duration-150 focus:outline-none cursor-pointer shadow-sm";
            } else {
                btn.className = "w-full text-left p-4 border-2 border-slate-200 rounded-xl font-medium text-slate-700 bg-white hover:border-blue-500 hover:bg-blue-50/50 active:scale-98 transition duration-150 focus:outline-none cursor-pointer shadow-sm";
            }
        }

        function selectOption(questionHtml, optionText, shortText, nextNodeKey) {
            const cleanQuestion = questionHtml.replace(/<[^>]*>/g, '').trim();
            userAnswers.push({
                step: historyStack.length,
                question: cleanQuestion,
                answer: optionText,
                short: shortText
            });
            historyStack.push(nextNodeKey);
            renderCurrentNode();
        }

        btnBack.onclick = () => {
            if (historyStack.length > 1) {
                historyStack.pop();
                userAnswers.pop();
                renderCurrentNode();
            }
        };

        btnRestart.onclick = () => {
            historyStack = ['q1'];
            userAnswers = [];
            renderCurrentNode();
        };

        btnReport.onclick = () => {
            const targetEmail = "taiwanwatercorp@gmail.com";
            const emailSubject = "【水費異常自我檢測系統】用戶檢測結果回報";
            const mailtoUrl = `mailto:${targetEmail}?subject=${encodeURIComponent(emailSubject)}&body=${encodeURIComponent(generatedReportText)}`;
            window.location.href = mailtoUrl;
        };

        // 夜間模式切換
        btnTheme.onclick = () => {
            isDarkMode = !isDarkMode;
            
            if (isDarkMode) {
                btnTheme.innerText = '🌙';
                bodyEl.style.backgroundColor = '#1E293B';
                bodyEl.style.color = '#F8FAFC';
                
                mainCardEl.className = "bg-slate-800/95 backdrop-blur-sm rounded-2xl shadow-xl p-6 md:p-8 w-full border border-slate-700 transition-all duration-300";
                progressBgEl.className = "w-full bg-slate-700 h-2 rounded-full overflow-hidden";
                footerLineEl.className = "mt-8 pt-4 border-t border-slate-700 flex justify-between items-center";
                
                document.getElementById('wm-circle-out').setAttribute('stroke', '#60A5FA');
                document.getElementById('wm-circle-in').setAttribute('fill', '#3B82F6');
                document.getElementById('wm-text').className = "text-blue-400 font-bold text-3xl tracking-widest mt-4 text-center whitespace-nowrap";
                
                meterHelper.className = "hidden mb-6 flex flex-col items-center bg-slate-900 border border-slate-700 p-4 rounded-xl shadow-sm max-w-full";
                
            } else {
                btnTheme.innerText = '☀️';
                bodyEl.style.backgroundColor = '#F8FAFC';
                bodyEl.style.color = '#1E293B';
                
                mainCardEl.className = "bg-white/95 backdrop-blur-sm rounded-2xl shadow-xl p-6 md:p-8 w-full border border-slate-100 transition-all duration-300";
                progressBgEl.className = "w-full bg-slate-100 h-2 rounded-full overflow-hidden";
                footerLineEl.className = "mt-8 pt-4 border-t border-slate-100 flex justify-between items-center";
                
                document.getElementById('wm-circle-out').setAttribute('stroke', '#0066CC');
                document.getElementById('wm-circle-in').setAttribute('fill', '#0066CC');
                document.getElementById('wm-text').className = "text-[#0066CC] font-bold text-3xl tracking-widest mt-4 text-center whitespace-nowrap";
                
                meterHelper.className = "hidden mb-6 flex flex-col items-center bg-slate-50 border border-slate-200 p-4 rounded-xl shadow-sm max-w-full";
            }

            const optionsButtons = optionsContainer.querySelectorAll('button');
            optionsButtons.forEach(btn => applyButtonTheme(btn));
            
            renderCurrentNode();
        };

        function updateDynamicColors() {
            const q1Hint = document.getElementById('q1-hint');
            const helperTitle = document.querySelector('#meter-helper .text-blue-700, #meter-helper .text-blue-400');
            const helperDesc = document.getElementById('meter-helper');
            
            if (isDarkMode) {
                questionText.className = "text-xl font-semibold text-slate-100 mb-6 leading-relaxed";
                if(q1Hint) q1Hint.className = "block text-sm font-normal text-slate-400 mt-1";
                if(helperTitle) { helperTitle.className = "font-bold text-blue-400 mb-1 border-b border-slate-700 pb-1 flex items-center gap-1"; }
                if(helperDesc) { helperDesc.querySelectorAll('p').forEach(p => p.className = "text-slate-300"); }
                btnBack.className = "px-4 py-2 border border-slate-600 text-slate-300 rounded-lg text-sm font-medium hover:bg-slate-700 disabled:opacity-30 disabled:pointer-events-none transition cursor-pointer";
                btnRestart.className = "px-4 py-2 bg-slate-200 text-slate-900 rounded-lg text-sm font-medium hover:bg-white transition cursor-pointer";
                
                if (resultTextEl.parentElement && !resultContainer.classList.contains('hidden')) {
                    resultTextEl.className = "w-full text-left font-mono bg-slate-800/80 border border-slate-700 rounded-xl p-5 shadow-inner leading-relaxed text-sm";
                }
            } else {
                questionText.className = "text-xl font-semibold text-slate-800 mb-6 leading-relaxed";
                if(q1Hint) q1Hint.className = "block text-sm font-normal text-slate-500 mt-1";
                if(helperTitle) { helperTitle.className = "font-bold text-blue-700 mb-1 border-b border-blue-200 pb-1 flex items-center gap-1"; }
                if(helperDesc) { helperDesc.querySelectorAll('p').forEach(p => p.className = "text-slate-600"); }
                btnBack.className = "px-4 py-2 border border-slate-300 text-slate-600 rounded-lg text-sm font-medium hover:bg-slate-50 disabled:opacity-30 disabled:pointer-events-none transition cursor-pointer";
                btnRestart.className = "px-4 py-2 bg-slate-800 text-white rounded-lg text-sm font-medium hover:bg-slate-900 transition cursor-pointer";
                
                if (resultTextEl.parentElement && !resultContainer.classList.contains('hidden')) {
                    resultTextEl.className = "w-full text-left font-mono bg-slate-50 border border-slate-200 rounded-xl p-5 shadow-inner leading-relaxed text-sm";
                }
            }
        }

        renderCurrentNode();
    </script>
</body>
</html>
